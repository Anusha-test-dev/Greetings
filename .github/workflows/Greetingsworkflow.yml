name: Greetings Workflow

on: 
  workflow_dispatch:
    inputs:
      greeting:
        description: 'Enter your greeting message'
        required: true
        type: string
permissions: 
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create index.html
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head> <title>Greeting</title></head>
          <body>
            <h1>"${{inputs.greeting}}"</h1>
          </body>
          </html>" > index.html
          
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116912494636:role/github-Anusha-test-dev-role
          aws-region: us-east-2
      - name: Upload to S3
        run: |
          aws s3 cp index.html s3://greetings-from-user/index.html --content-type "text/html"

    
