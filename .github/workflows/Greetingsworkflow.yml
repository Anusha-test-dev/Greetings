name: Greetings Workflow

on:
  workflow_dispatch:
    inputs:
      greeting:
        description: 'Enter your greeting message here'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  Authorization-to-AWS-using-shared-runner:
    if: startsWith(github.ref, 'refs/heads/feature-')
    runs-on: ubuntu-latest
    outputs:
      ecr_password: ${{ steps.get-pass.outputs.password }}

    steps:
      - name: Configure AWS Credentials
        id: region
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116912494636:role/github-Anusha-test-dev-role
          aws-region: us-east-2

      - name: Get ECR password
        id: get-pass
        run: |
          PASS=$(aws ecr get-login-password --region us-east-2)
          echo "password=$PASS" >> $GITHUB_OUTPUT

  build-and-push-image-to-ecr:
    if: startsWith(github.ref, 'refs/heads/feature-')
    needs: Authorization-to-AWS-using-shared-runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::116912494636:role/github-Anusha-test-dev-role
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: greetings-workflow-image
          IMAGE_TAG: greeting
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .github/workflows

      - name: Push Docker image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: greetings-workflow-image
          IMAGE_TAG: greeting
        run: |
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

  build-operation-using-my-image-from-ecr:
    needs:
      - Authorization-to-AWS-using-shared-runner
      - build-and-push-image-to-ecr
    runs-on: ubuntu-latest

    container:
      image: 116912494636.dkr.ecr.us-east-2.amazonaws.com/greetings-workflow-image:greeting
      credentials:
        username: AWS
        password: ${{ needs.Authorization-to-AWS-using-shared-runner.outputs.ecr_password }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
           role-to-assume: arn:aws:iam::116912494636:role/github-Anusha-test-dev-role
           aws-region: us-east-2

      - name: Checkout-Repo
        uses: actions/checkout@v4

      - name: Create index.html
        run: |
          echo "<!DOCTYPE html>
          <html>
          <head> <title>Greeting</title></head>
          <body>
            <h1>"${{inputs.greeting}}"</h1>
          </body>
          </html>" > index.html

      - name: Upload to S3
        run: |
          aws s3 cp index.html s3://greetings-from-user/index.html --content-type "text/html"